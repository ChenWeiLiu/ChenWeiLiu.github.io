<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第六週單字小考 - 3/19</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f8ff;
            padding: 20px;
            text-align: center;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .list-box {
            width: 200px;
            background: white;
            border: 2px solid #4a90e2;
            border-radius: 10px;
            padding: 10px;
            text-align: left;
            min-height: 250px;
        }

        .list-box h2 {
            text-align: center;
        }

        li {
            font-size: 18px;
            margin: 6px 0;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 8px;
        }

        li:hover {
            background: #e0f0ff;
            border-radius: 6px;
        }

        .selected-word-tag {
            background: #4a90e2;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .selected-word-tag:hover {
            background: #357abd;
        }

        .tested {
            color: #27ae60;
            font-size: 36px;
        }

        button {
            padding: 16px 28px;
            font-size: 22px;
            margin: 12px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            background: #ff9f43;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background: #ff7f00;
        }

        #currentWordDisplay {
            font-size: 40px;
            font-weight: bold;
            margin-top: 10px;
            min-height: 50px;
        }

        .word-box {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
            min-height: 40px;
        }

        .learn-controls {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
            border-radius: 16px;
            border: 2px solid #66bb6a;
        }

        .learn-controls h3 {
            color: #2e7d32;
            margin-top: 0;
        }

        .loop-selector {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            font-size: 18px;
        }

        .loop-selector select {
            padding: 8px 12px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #66bb6a;
        }

        #learnProgress {
            margin-top: 12px;
            font-size: 20px;
            color: #2e7d32;
            font-weight: bold;
            min-height: 30px;
        }

        #learnWordDisplay {
            margin-top: 10px;
            font-size: 32px;
            font-weight: bold;
            color: #1b5e20;
            min-height: 45px;
        }

        #learnStepDisplay {
            margin-top: 6px;
            font-size: 18px;
            color: #555;
            min-height: 25px;
        }
    </style>
</head>

<body>
    <h1>第六週單字小考 (3/19)</h1>
    <p>Press the button to hear a word. It will be spoken once.</p>
    <div id="currentWordDisplay"></div>

    <div id="selectedWordsDisplay" style="margin: 20px 0; min-height: 30px;">
        <div style="font-size: 18px; color: #555; margin-bottom: 10px;">Selected Words:</div>
        <div id="selectedWordsList" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>
    </div>

    <button onclick="nextWord()">Next Word</button>
    <button onclick="replayWord()">Replay Current Word</button>
    <button onclick="showPhonics()" style="background: #2ecc71;">Show Phonics</button>
    <button onclick="startAutoQuiz()" id="autoQuizBtn" style="background: #9b59b6;">🎯 自動測驗模式</button>
    <button onclick="stopAutoQuiz()" id="stopQuizBtn" style="background: #e74c3c; display: none;">⏹ 停止測驗</button>

    <div id="autoQuizStatus" style="margin-top: 15px; font-size: 24px; color: #9b59b6; font-weight: bold;"></div>

    <div class="learn-controls">
        <h3>📖 自動學習模式</h3>
        <p style="font-size: 16px; color: #555;">按下播放，孩子只要坐著聽：唸單字 → 逐字拼讀 → 音節拆解 → 完整唸一次 → 停頓跟讀</p>
        <div class="loop-selector">
            <label for="loopCount">循環次數：</label>
            <select id="loopCount">
                <option value="1">1 輪</option>
                <option value="2" selected>2 輪</option>
                <option value="3">3 輪</option>
                <option value="4">4 輪</option>
                <option value="5">5 輪</option>
            </select>
        </div>
        <div>
            <button onclick="startAutoLearn()" id="autoLearnBtn" style="background: #43a047;">▶️ 開始學習</button>
            <button onclick="stopAutoLearn()" id="stopLearnBtn" style="background: #e74c3c; display: none;">⏹ 停止學習</button>
        </div>
        <div id="learnProgress"></div>
        <div id="learnWordDisplay"></div>
        <div id="learnStepDisplay"></div>
    </div>

    <div style="margin-top: 20px;">
        <label for="voiceSelector" style="font-size: 18px; margin-right: 10px;">選擇發音：</label>
        <select id="voiceSelector" onchange="changeVoice()" style="padding: 8px; font-size: 16px; border-radius: 8px;">
        </select>
    </div>

    <div class="container">
        <div class="list-box">
            <h2>Words To Study</h2>
            <ul id="leftList"></ul>
        </div>

        <div class="list-box">
            <h2>Words Tested</h2>
            <ol id="rightList"></ol>
        </div>
    </div>

    <div class="word-box" id="statusBox"></div>

    <script>
        let availableWords = [
            { word: "encounter", breakdown: "en - coun - ter", ipa: "/ɪnˈkaʊntər/", phonicsSounds: ["en", "coun", "ter"] },
            { word: "fiber", breakdown: "fi - ber", ipa: "/ˈfaɪbər/", phonicsSounds: ["fy", "ber"] },
            { word: "tattoo", breakdown: "tat - too", ipa: "/tæˈtuː/", phonicsSounds: ["tat", "too"] },
            { word: "extreme", breakdown: "ex - treme", ipa: "/ɪkˈstriːm/", phonicsSounds: ["ex", "treem"] },
            { word: "governor", breakdown: "gov - er - nor", ipa: "/ˈɡʌvərnər/", phonicsSounds: ["guv", "er", "ner"] },
            { word: "engineer", breakdown: "en - gi - neer", ipa: "/ˌɛndʒɪˈnɪr/", phonicsSounds: ["en", "juh", "neer"] },
            { word: "coast", breakdown: "coast", ipa: "/koʊst/", phonicsSounds: ["kohst"] },
            { word: "retreat", breakdown: "re - treat", ipa: "/rɪˈtriːt/", phonicsSounds: ["re", "treet"] },
            { word: "present", breakdown: "pres - ent", ipa: "/ˈprɛzənt/", phonicsSounds: ["prez", "ent"] },
            { word: "surround", breakdown: "sur - round", ipa: "/səˈraʊnd/", phonicsSounds: ["sur", "round"] },
            { word: "enemy", breakdown: "en - e - my", ipa: "/ˈɛnəmi/", phonicsSounds: ["en", "uh", "mee"] },
            { word: "worship", breakdown: "wor - ship", ipa: "/ˈwɜːrʃɪp/", phonicsSounds: ["wer", "ship"] },
            { word: "tourist", breakdown: "tour - ist", ipa: "/ˈtʊrɪst/", phonicsSounds: ["toor", "ist"] },
            { word: "located", breakdown: "lo - ca - ted", ipa: "/ˈloʊkeɪtɪd/", phonicsSounds: ["loh", "kay", "tid"] },
            { word: "separate", breakdown: "sep - a - rate", ipa: "/ˈsɛpəreɪt/", phonicsSounds: ["sep", "uh", "rayt"] }
        ];

        let testedWords = [];
        let selectedWords = []; // 用戶選擇要考的單字

        let currentWordObj = null;
        let usVoice = null;

        function loadVoices() {
            const voices = speechSynthesis.getVoices();
            const enUSVoices = voices.filter(v => v.lang === "en-US");

            // 填充下拉選單
            const selector = document.getElementById("voiceSelector");
            selector.innerHTML = "";

            enUSVoices.forEach((voice, index) => {
                const option = document.createElement("option");
                option.value = index;
                option.textContent = voice.name + (voice.lang !== "en-US" ? " (" + voice.lang + ")" : "");
                selector.appendChild(option);
            });

            // 優先選擇 Flo
            let defaultVoice = enUSVoices.find(v => v.name === "Flo");
            if (!defaultVoice) defaultVoice = enUSVoices.find(v => v.lang === "en-US" && v.name.includes("Male"));
            if (!defaultVoice) defaultVoice = enUSVoices.find(v => v.name === "Aaron"); // Mac 常見男聲
            if (!defaultVoice) defaultVoice = enUSVoices.find(v => v.name === "Google US English"); // Chrome 常見
            if (!defaultVoice) defaultVoice = enUSVoices.find(v => v.name === "Samantha"); // Mac 備案
            if (!defaultVoice) defaultVoice = enUSVoices[0];

            usVoice = defaultVoice;

            // 設定下拉選單的預設值
            const defaultIndex = enUSVoices.indexOf(defaultVoice);
            if (defaultIndex !== -1) {
                selector.selectedIndex = defaultIndex;
            }

            // 儲存所有可用的聲音供切換使用
            window.availableVoices = enUSVoices;
        }

        function changeVoice() {
            const selector = document.getElementById("voiceSelector");
            const selectedIndex = selector.value;
            usVoice = window.availableVoices[selectedIndex];
        }

        speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function toggleWordSelection(word) {
            const wordObj = availableWords.find(w => w.word === word);
            if (!wordObj) return;

            // 將單字加入選擇列表
            selectedWords.push(wordObj);

            // 從可用列表中移除
            const index = availableWords.findIndex(w => w.word === word);
            if (index !== -1) {
                availableWords.splice(index, 1);
            }

            refreshLists();
        }

        function removeFromSelected(word) {
            const index = selectedWords.findIndex(w => w.word === word);
            if (index !== -1) {
                const wordObj = selectedWords[index];
                selectedWords.splice(index, 1);
                availableWords.push(wordObj);
                refreshLists();
            }
        }

        function refreshLists() {
            // 更新可用單字列表
            document.getElementById("leftList").innerHTML = availableWords
                .map(w => `<li onclick="toggleWordSelection('${w.word}')">${w.word}</li>`)
                .join("");

            // 更新已測試單字列表
            document.getElementById("rightList").innerHTML = testedWords
                .map(w => `<li class='tested' onclick="speakOnce('${w.word}')">${w.word}</li>`)
                .join("");

            // 更新選擇的單字顯示
            document.getElementById("selectedWordsList").innerHTML = selectedWords
                .map(w => `<span class="selected-word-tag" onclick="removeFromSelected('${w.word}')">${w.word} ×</span>`)
                .join("");
        }

        function speakOnce(word) {
            const utter = new SpeechSynthesisUtterance(word);
            utter.lang = "en-US"; // 強制設定語言
            utter.rate = 0.75;
            utter.pitch = 1.0; // 調整為正常音調
            if (usVoice) {
                utter.voice = usVoice;
            }
            speechSynthesis.speak(utter);
        }

        function nextWord() {
            // 如果有選擇的單字，從選擇的單字中抽取
            const wordsToTest = selectedWords.length > 0 ? selectedWords : availableWords;

            if (wordsToTest.length === 0) {
                document.getElementById("statusBox").innerText = "All words tested! Great job! 🎉";
                document.body.style.background = "#d6ffd6";
                return;
            }

            const index = Math.floor(Math.random() * wordsToTest.length);
            currentWordObj = wordsToTest[index];

            // 從兩個列表中移除
            const availableIndex = availableWords.findIndex(w => w.word === currentWordObj.word);
            if (availableIndex !== -1) {
                availableWords.splice(availableIndex, 1);
            }
            const selectedIndex = selectedWords.findIndex(w => w.word === currentWordObj.word);
            if (selectedIndex !== -1) {
                selectedWords.splice(selectedIndex, 1);
            }

            testedWords.push(currentWordObj);
            refreshLists();

            document.getElementById("currentWordDisplay").innerHTML =
                `${currentWordObj.word}<br><span style="font-size:24px; color:#555;">${currentWordObj.breakdown} &nbsp; ${currentWordObj.ipa}</span>`;
            document.getElementById("statusBox").innerText = "Playing word...";

            speakOnce(currentWordObj.word);
        }

        function showPhonics() {
            if (!currentWordObj) {
                document.getElementById("statusBox").innerText = "No word selected yet!";
                return;
            }

            document.getElementById("statusBox").innerText = "Playing phonics breakdown...";

            // Use phonicsSounds if available, otherwise split breakdown
            const parts = currentWordObj.phonicsSounds || currentWordObj.breakdown.split(" - ");

            // Create a sequence of utterances
            let delay = 0;

            parts.forEach(part => {
                setTimeout(() => speakOnce(part), delay);
                delay += 1000; // 1 second gap between parts
            });

            // Play full word at the end
            setTimeout(() => speakOnce(currentWordObj.word), delay);
        }

        function replayWord() {
            if (!currentWordObj) {
                document.getElementById("statusBox").innerText = "No word selected yet!";
                return;
            }
            document.getElementById("statusBox").innerText = "Replaying word...";
            speakOnce(currentWordObj.word);
        }

        // ============= 共用語音引擎 =============
        let activeMode = null; // 'quiz' or 'learn'
        let modeTimeouts = [];

        function isModeRunning() {
            return activeMode !== null;
        }

        function speakWithPromise(word, rate = 0.75) {
            return new Promise(resolve => {
                if (!isModeRunning()) { resolve(); return; }

                const utter = new SpeechSynthesisUtterance(word);
                utter.lang = "en-US";
                utter.rate = rate;
                utter.pitch = 1.0;
                if (usVoice) utter.voice = usVoice;

                let resolved = false;
                const safeResolve = () => {
                    if (!resolved) {
                        resolved = true;
                        resolve();
                    }
                };

                utter.onend = safeResolve;
                utter.onerror = safeResolve;

                // Timeout fallback for iOS
                const wordsCount = word.split(/\s+/).length;
                const baseMs = Math.max(800, wordsCount * 600);
                const fallbackMs = Math.ceil(baseMs / rate) + 500;
                const fallbackId = setTimeout(safeResolve, fallbackMs);
                modeTimeouts.push(fallbackId);

                speechSynthesis.speak(utter);

                // Keep alive for iOS
                const keepAliveId = setInterval(() => {
                    if (resolved || !isModeRunning()) {
                        clearInterval(keepAliveId);
                        return;
                    }
                    if (speechSynthesis.paused) {
                        speechSynthesis.resume();
                    }
                }, 3000);
                modeTimeouts.push(keepAliveId);
            });
        }

        function waitMs(ms) {
            return new Promise(resolve => {
                const timeoutId = setTimeout(resolve, ms);
                modeTimeouts.push(timeoutId);
            });
        }

        // ============= 自動測驗模式 =============
        let isAutoQuizRunning = false;
        let autoQuizWordsQueue = [];

        function speakEnglish(word, rate = 0.75) {
            return speakWithPromise(word, rate);
        }

        function wait(ms) {
            return waitMs(ms);
        }

        async function autoQuizWord(wordObj, index) {
            if (!isAutoQuizRunning) return;

            document.getElementById("autoQuizStatus").innerText =
                `第 ${index + 1} 個，共 ${autoQuizWordsQueue.length} 個`;
            document.getElementById("currentWordDisplay").innerHTML =
                `Word number ${index + 1}`;

            await speakEnglish(`Word number ${index + 1}`, 0.9);
            if (!isAutoQuizRunning) return;
            await wait(300);

            for (let cycle = 0; cycle < 2; cycle++) {
                if (!isAutoQuizRunning) return;
                const rate = cycle === 0 ? 0.3 : 1.0;

                await speakEnglish(wordObj.word, rate);
                if (!isAutoQuizRunning) return;
                await wait(400);

                const parts = wordObj.phonicsSounds || wordObj.breakdown.split(" - ");
                for (const part of parts) {
                    if (!isAutoQuizRunning) return;
                    await speakEnglish(part, rate);
                    await wait(300);
                }
                if (!isAutoQuizRunning) return;
                await wait(300);

                await speakEnglish(wordObj.word, rate);
                if (!isAutoQuizRunning) return;
                await wait(500);
            }

            const availableIndex = availableWords.findIndex(w => w.word === wordObj.word);
            if (availableIndex !== -1) availableWords.splice(availableIndex, 1);
            const selectedIndex = selectedWords.findIndex(w => w.word === wordObj.word);
            if (selectedIndex !== -1) selectedWords.splice(selectedIndex, 1);
            testedWords.push(wordObj);
            refreshLists();
            currentWordObj = wordObj;
            document.getElementById("currentWordDisplay").innerHTML =
                `${wordObj.word}<br><span style="font-size:24px; color:#555;">${wordObj.breakdown} &nbsp; ${wordObj.ipa}</span>`;
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        async function runAutoQuiz() {
            const wordsToQuiz = selectedWords.length > 0 ? [...selectedWords] : [...availableWords];
            autoQuizWordsQueue = shuffleArray(wordsToQuiz);

            if (autoQuizWordsQueue.length === 0) {
                document.getElementById("autoQuizStatus").innerText = "沒有單字可以考試！";
                stopAutoQuiz();
                return;
            }

            document.getElementById("autoQuizStatus").innerText =
                `開始自動測驗，共 ${autoQuizWordsQueue.length} 個單字`;
            await wait(1000);

            for (let i = 0; i < autoQuizWordsQueue.length; i++) {
                if (!isAutoQuizRunning) break;
                await autoQuizWord(autoQuizWordsQueue[i], i);
                if (!isAutoQuizRunning) break;
                if (i < autoQuizWordsQueue.length - 1) await wait(1000);
            }

            if (isAutoQuizRunning) {
                document.getElementById("autoQuizStatus").innerText = "🎉 所有單字都考完了！太棒了！";
                document.getElementById("statusBox").innerText = "All words tested! Great job! 🎉";
                document.body.style.background = "#d6ffd6";
                stopAutoQuiz();
            }
        }

        function startAutoQuiz() {
            if (isModeRunning()) stopCurrentMode();
            isAutoQuizRunning = true;
            activeMode = 'quiz';
            document.getElementById("autoQuizBtn").style.display = "none";
            document.getElementById("stopQuizBtn").style.display = "inline-block";

            // iOS Safari: prime speech synthesis with user gesture
            primeSpeech();

            setTimeout(() => {
                if (isAutoQuizRunning) runAutoQuiz();
            }, 300);
        }

        function stopAutoQuiz() {
            isAutoQuizRunning = false;
            stopCurrentMode();
            document.getElementById("autoQuizBtn").style.display = "inline-block";
            document.getElementById("stopQuizBtn").style.display = "none";
            if (document.getElementById("autoQuizStatus").innerText.indexOf("🎉") === -1) {
                document.getElementById("autoQuizStatus").innerText = "測驗已停止";
            }
        }

        // ============= 共用工具 =============
        function primeSpeech() {
            const primer = new SpeechSynthesisUtterance(" ");
            primer.lang = "en-US";
            primer.volume = 0.01;
            primer.rate = 2;
            if (usVoice) primer.voice = usVoice;
            speechSynthesis.speak(primer);
        }

        function stopCurrentMode() {
            activeMode = null;
            speechSynthesis.cancel();
            modeTimeouts.forEach(id => {
                clearTimeout(id);
                clearInterval(id);
            });
            modeTimeouts = [];
        }

        // ============= 自動學習模式 =============
        let isAutoLearnRunning = false;

        async function learnWord(wordObj, wordIndex, totalWords, round, totalRounds) {
            if (!isAutoLearnRunning) return;

            const progress = document.getElementById("learnProgress");
            const wordDisplay = document.getElementById("learnWordDisplay");
            const stepDisplay = document.getElementById("learnStepDisplay");

            progress.innerText = `第 ${round} / ${totalRounds} 輪 — 第 ${wordIndex + 1} / ${totalWords} 個單字`;
            wordDisplay.innerText = wordObj.word;

            // Step 1: 唸單字（慢速）
            stepDisplay.innerText = "🔊 唸單字（慢速）";
            await speakWithPromise(wordObj.word, 0.4);
            if (!isAutoLearnRunning) return;
            await waitMs(500);

            // Step 2: 逐字母拼讀（一次連續唸出）
            const letters = wordObj.word.toUpperCase().split("");
            stepDisplay.innerText = "🔤 拼讀字母：" + letters.join(" - ");
            const spellingText = letters.join(", ");
            await speakWithPromise(spellingText, 1.0);
            if (!isAutoLearnRunning) return;
            await waitMs(300);

            // Step 3: 音節拆解
            const parts = wordObj.phonicsSounds || wordObj.breakdown.split(" - ");
            stepDisplay.innerText = "📝 音節拆解：" + wordObj.breakdown;
            for (const part of parts) {
                if (!isAutoLearnRunning) return;
                await speakWithPromise(part, 0.6);
                await waitMs(400);
            }
            if (!isAutoLearnRunning) return;
            await waitMs(300);

            // Step 4: 再唸一次（正常速度）
            stepDisplay.innerText = "🔊 完整唸一次";
            await speakWithPromise(wordObj.word, 0.85);
            if (!isAutoLearnRunning) return;

            // Step 5: 停頓讓孩子跟讀
            stepDisplay.innerText = "⏸️ 跟讀時間...";
            wordDisplay.innerHTML = `${wordObj.word}<br><span style="font-size:20px; color:#666;">${wordObj.breakdown} &nbsp; ${wordObj.ipa}</span>`;
            await waitMs(3000);
        }

        async function runAutoLearn() {
            const wordsToLearn = selectedWords.length > 0 ? [...selectedWords] : [...availableWords];
            const totalRounds = parseInt(document.getElementById("loopCount").value) || 2;

            if (wordsToLearn.length === 0) {
                document.getElementById("learnProgress").innerText = "沒有單字可以學習！";
                stopAutoLearn();
                return;
            }

            const totalWords = wordsToLearn.length;

            for (let round = 1; round <= totalRounds; round++) {
                if (!isAutoLearnRunning) break;

                document.getElementById("learnProgress").innerText =
                    `🔄 第 ${round} / ${totalRounds} 輪開始！`;
                await waitMs(1000);

                for (let i = 0; i < wordsToLearn.length; i++) {
                    if (!isAutoLearnRunning) break;
                    await learnWord(wordsToLearn[i], i, totalWords, round, totalRounds);
                    if (!isAutoLearnRunning) break;
                    if (i < wordsToLearn.length - 1) await waitMs(800);
                }

                if (isAutoLearnRunning && round < totalRounds) {
                    document.getElementById("learnProgress").innerText =
                        `✅ 第 ${round} 輪完成！準備下一輪...`;
                    document.getElementById("learnStepDisplay").innerText = "";
                    await waitMs(2000);
                }
            }

            if (isAutoLearnRunning) {
                document.getElementById("learnProgress").innerText =
                    `🎉 全部 ${totalRounds} 輪學習完成！太棒了！`;
                document.getElementById("learnWordDisplay").innerText = "";
                document.getElementById("learnStepDisplay").innerText = "";
                stopAutoLearn();
            }
        }

        function startAutoLearn() {
            if (isModeRunning()) stopCurrentMode();
            isAutoLearnRunning = true;
            activeMode = 'learn';
            document.getElementById("autoLearnBtn").style.display = "none";
            document.getElementById("stopLearnBtn").style.display = "inline-block";

            primeSpeech();

            setTimeout(() => {
                if (isAutoLearnRunning) runAutoLearn();
            }, 300);
        }

        function stopAutoLearn() {
            isAutoLearnRunning = false;
            stopCurrentMode();
            document.getElementById("autoLearnBtn").style.display = "inline-block";
            document.getElementById("stopLearnBtn").style.display = "none";
            if (document.getElementById("learnProgress").innerText.indexOf("🎉") === -1) {
                document.getElementById("learnProgress").innerText = "學習已停止";
            }
        }

        refreshLists();
    </script>
</body>

</html>
